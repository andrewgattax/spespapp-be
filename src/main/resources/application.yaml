server:
  servlet:
    context-path: /api
  port: ${SERVER_PORT:8080}
  address: 0.0.0.0

spring:
  application:
    name: spespapp-be

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

security:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}

logging:
  level:
    it.trinex.spespappbe.security.rsa.RsaAuthenticationProvider: DEBUG
    org.springframework.security: DEBUG
